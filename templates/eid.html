<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حظك في العيد 🎉</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --medical-blue: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        h1 { color: var(--primary-color); margin-bottom: 10px; font-size: 24px; }
        p.subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #spinBtn {
            background-color: var(--accent-color);
            color: white;
        }

        #spinBtn:hover { background-color: #c0392b; transform: translateY(-2px); }

        /* زر المشاركة يكون مخفياً في البداية */
        #shareBtn {
            background-color: #25d366; /* لون الواتساب */
            color: white;
            display: none;
            font-size: 16px;
            text-decoration: none;
            align-items: center;
            justify-content: center;
        }

        #result {
            margin: 25px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .final-text {
            font-size: 24px;
            color: var(--medical-blue);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* رسالة التهنئة اللطيفة */
        #greeting {
            margin-top: 15px;
            padding: 10px;
            background: #f0fdf4;
            border-right: 4px solid #22c55e;
            color: #166534;
            font-size: 14px;
            display: none;
            border-radius: 4px;
        }

        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 اختبر حظك في العيد 😂</h1>
        <p class="subtitle">مجرد تجربة عشوائية للضحك… لا تتحمل النتائج النفسية 😂</p>
        
        <div id="result">
            <span style="color: #95a5a6;">اضغط على الزر لتعرف مصيرك..</span>
        </div>

        <div class="btn-group">
            <button id="spinBtn">شوف حظي شنو 🎲</button>
            <a id="shareBtn" href="#" target="_blank">شارك نتيجتك (واتساب) 🟢</a>
        </div>

        <div id="greeting">
            بعيداً عن الهزار.. كل عام وأنت بخير، وعيد سعيد عليك وعلى أحبابك! ✨❤️
        </div>
    </div>

    <script>
        const results = [
    "نوم عميق من صلاة العيد لحد المغرب 🥩😴",
    "زيارات إجبارية لبيوت أول مرة تشوفها في حياتك 🏃‍♂️ الابتسامة تسلكك",
    "تتشيك بـ (فول ميكب / جلابية مكوّية) وتقعد في الصالون للمغتربين 🤵‍♂️✨",
    "توزع عيادي للأطفال لحد ما محفظتك تعلن الإفلاس التام 🪙💸",
    "تسأل عن العيدية يقولوا ليك: (خلاص كبرت بقيت طول الباب!) 🚫😭",
    "تلبس لبسة العيد وتكتشف إنها ضاقت عليك بسبب قعدة رمضان 👖 الحزام يستغيث",
    "مشوار بالليل مع الحبايب لكباية شاي مقنن في شارع النيل 🌃☕",
    "تاكل خبيز دايت عشان الضمير، وتتحلى بـ 4 قطع بسبوسة 🍪 سكرك في السماء"
];


        const btn = document.getElementById('spinBtn');
        const shareBtn = document.getElementById('shareBtn');
        const resultDiv = document.getElementById('result');
        const greetingDiv = document.getElementById('greeting');

        btn.addEventListener('click', () => {
            btn.disabled = true;
            shareBtn.style.display = 'none';
            greetingDiv.style.display = 'none';
            
            let counter = 0;
            const interval = setInterval(() => {
                resultDiv.innerHTML = `<span style="color: #7f8c8d;">${results[Math.floor(Math.random() * results.length)]}</span>`;
                counter++;
                
                if (counter > 15) {
                    clearInterval(interval);
                    const finalResult = results[Math.floor(Math.random() * results.length)];
                    
                    // إظهار النتيجة النهائية
                    resultDiv.innerHTML = `عيدك هو:<br><b class="final-text">${finalResult}</b>`;
                    
                    // تجهيز رابط الواتساب
                    const shareText = encodeURIComponent(
`💀 دخلت الموقع عشان أضحك… طلع فضحني:

"${finalResult}"

هسي دورك 😂👇
جرب حظك في العيد 🎉`
);
                    shareBtn.href = `https://api.whatsapp.com/send?text=${shareText}`;
                    
                    // إظهار العناصر الإضافية
                    setTimeout(() => {
                        shareBtn.style.display = 'flex';
                        btn.disabled = false;
                        btn.innerText = "جرب حظك تاني 🔄";
                    }, 500);

                    // إظهار التهنئة اللطيفة بعد 2 ثانية
                    setTimeout(() => {
                        greetingDiv.style.display = 'block';
                    }, 2000);
                }
            }, 80);
        });
    </script>

</body>
</html>
