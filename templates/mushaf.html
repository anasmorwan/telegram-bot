<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">

<style>

body{
    font-size:40px;
    font-family:Amiri;
    background:#f5f1e8;
    padding:40px;
    line-height:2.5;
}

.active{
    background:yellow;
}

</style>

</head>

<body>

<div id="quran">

{% for ayah in surah.ayahs %}

<span
class="{% if ayah.number == current_ayah %}active{% endif %}"
id="ayah-{{ ayah.number }}"
>
{{ ayah.text }}
</span>

{% endfor %}

</div>

<script>

async function updateAyah(){

    let response = await fetch('/current')
    let data = await response.json()

    document.querySelectorAll('span').forEach(
        el => el.classList.remove('active')
    )

    let ayah = document.getElementById(
        'ayah-' + data.ayah
    )

    if(ayah){
        ayah.classList.add('active')
    }
}

setInterval(updateAyah,1000)

</script>

</body>
</html>
